<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="icon" href="/icon.svg" />
    <title>Kinweave</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font: 16px/1.5 -apple-system, system-ui, sans-serif;
        background: #0f172a; color: #e2e8f0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      }
      #app { max-width: 520px; margin: 0 auto; padding: 20px; }
      h1 { font-size: 1.4rem; margin: 0 0 4px; }
      h2 { font-size: 1.1rem; margin: 20px 0 8px; }
      .muted { color: #94a3b8; font-size: 0.9rem; }
      button {
        font: inherit; padding: 12px 16px; border-radius: 12px; border: 0; margin: 6px 0;
        background: #6366f1; color: white; width: 100%; cursor: pointer;
      }
      button.ghost { background: #1e293b; color: #e2e8f0; }
      button.danger { background: #b91c1c; }
      input, textarea, select {
        font: inherit; width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155;
        background: #0b1220; color: #e2e8f0; margin: 6px 0;
      }
      .card { background: #1e293b; border-radius: 14px; padding: 16px; margin: 12px 0; }
      .log { max-height: 46vh; overflow-y: auto; }
      .bubble { padding: 10px 12px; border-radius: 12px; margin: 6px 0; max-width: 85%; }
      .me { background: #6366f1; margin-left: auto; }
      .ai { background: #1e293b; }
      .qr { background: white; padding: 12px; border-radius: 12px; display: inline-block; }
      .link { word-break: break-all; font-size: 0.8rem; color: #93c5fd; }
      .pill { display: inline-block; background: #334155; border-radius: 999px; padding: 2px 10px; margin: 2px; font-size: 0.85rem; }
      .row { display: flex; gap: 10px; }
      .row > * { flex: 1; }
    </style>
  </head>
  <body>
    <div id="app">Loading…</div>
    <script type="module" src="/app.js"></script>
    <script>
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
    </script>
  </body>
</html>
